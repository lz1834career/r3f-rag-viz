name: Bug Report
description: Something is broken in the demo or library
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please include steps to reproduce and your environment.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open https://r3f-rag-viz-demo.vercel.app/
        2. Search for "..."
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Live demo (Vercel)
        - r3f-rag-viz-react (3D scene)
        - r3f-rag-viz-core (types / layout)
        - Local dev setup
        - CI / build
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / OS (if UI or WebGL)
      placeholder: e.g. Chrome 124 / Windows 11

  - type: textarea
    id: logs
    attributes:
      label: Console errors or screenshots
      description: Paste errors or drag screenshots here

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues
          required: true
        - label: I tried the latest commit or deployed demo
          required: true
